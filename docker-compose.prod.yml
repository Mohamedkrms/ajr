version: '3.8'

services:
  client:
    image: quran-client-prod
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_ADMIN_EMAIL=${VITE_ADMIN_EMAIL}
        - VITE_IMAGEKIT_URL_ENDPOINT=${VITE_IMAGEKIT_URL_ENDPOINT}
        - VITE_IMAGEKIT_PUBLIC_KEY=${VITE_IMAGEKIT_PUBLIC_KEY}
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - server

  server:
    image: quran-server-prod
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/quran_app
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
