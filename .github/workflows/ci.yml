name: Ajr Web App CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Backend Dependencies
      run: |
        cd server
        npm install

    - name: Install Frontend Dependencies
      run: |
        cd client
        npm install

    # Placeholder for tests
    # - name: Run Tests
    #   run: npm test

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Backend Docker Image
      run: docker build -t quran-server ./server

    - name: Build Frontend Docker Image
      run: |
        docker build -t quran-client \
        -f ./client/Dockerfile.prod \
        --build-arg VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }} \
        --build-arg VITE_ADMIN_EMAIL=${{ secrets.VITE_ADMIN_EMAIL }} \
        --build-arg VITE_IMAGEKIT_URL_ENDPOINT=${{ secrets.VITE_IMAGEKIT_URL_ENDPOINT }} \
        --build-arg VITE_IMAGEKIT_PUBLIC_KEY=${{ secrets.VITE_IMAGEKIT_PUBLIC_KEY }} \
        ./client
