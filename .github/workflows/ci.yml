name: Ajr Web App CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Backend Dependencies
      run: |
        cd server
        npm install

    - name: Install Frontend Dependencies
      run: |
        cd client
        npm install

    # Placeholder for tests
    # - name: Run Tests
    #   run: npm test

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Backend Docker Image
      run: docker build -t quran-server ./server

    - name: Build Frontend Docker Image
      run: docker build -t quran-client ./client
